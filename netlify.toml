[build]
  publish = "dist"
  command = "npm run build"
[build.environment]
  NODE_VERSION = "20"

[build.processing.html]
  pretty_urls = false
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/admin/review/*"
  to = "/admin/review/draft"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/learn/library"
  status = 301

[[redirects]]
  from = "/topics"
  to = "/learn/topics"
  status = 301

[[redirects]]
  from = "/topics/*"
  to = "/learn/topics/:splat"
  status = 301

[[redirects]]
  from = "/shop"
  to = "/solutions/shop-preview"
  status = 301

[[redirects]]
  from = "/early-access"
  to = "/solutions/early-access"
  status = 301
